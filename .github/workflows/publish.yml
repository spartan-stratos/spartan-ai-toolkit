name: Publish to npm

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Release"]
    types: [completed]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches
        run: |
          FILE_VERSION=$(cat toolkit/VERSION | tr -d '[:space:]')
          PKG_VERSION=$(node -p "require('./toolkit/package.json').version")
          if [ "$FILE_VERSION" != "$PKG_VERSION" ]; then
            echo "VERSION file ($FILE_VERSION) doesn't match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $FILE_VERSION"

      - name: Check if already published
        id: check
        run: |
          PKG_VERSION=$(node -p "require('./toolkit/package.json').version")
          if npm view @c0x12c/spartan-ai-toolkit@$PKG_VERSION version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "v$PKG_VERSION already on npm, skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Validate structure
        if: steps.check.outputs.already_published == 'false'
        run: |
          echo "Checking required files..."
          for f in \
            toolkit/commands/spartan.md \
            toolkit/claude-md/00-header.md \
            toolkit/package.json \
            toolkit/bin/cli.js \
            toolkit/.claude-plugin/plugin.json; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All required files present."

          CMD_COUNT=$(ls toolkit/commands/spartan/*.md 2>/dev/null | wc -l)
          SKILL_COUNT=$(ls -d toolkit/skills/*/ 2>/dev/null | wc -l)
          echo "Commands: $CMD_COUNT, Skills: $SKILL_COUNT"

      - name: Publish
        if: steps.check.outputs.already_published == 'false'
        working-directory: toolkit
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
